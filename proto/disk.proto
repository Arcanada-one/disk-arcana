// Disk Arcana wire format — Phase 3 gRPC Transport.
//
// proto3 compat rules (enforced via CONTRIBUTING.md):
//   1. Never delete a field — mark it `reserved`.
//   2. Never change a field's type — add a new field with a new tag instead.
//   3. Tags 1-15 are 1-byte; reserve them for hot-path fields.
//   4. Forward-compat tags are populated with default ("" / 0 / empty bytes)
//      in self-hosted v1.0 and filled in DISK-0015 (E2EE), DISK-0017 (multi-tenant),
//      DISK-0020 (versioning).

syntax = "proto3";

package disk;

// -----------------------------------------------------------------------------
// File-level metadata
// -----------------------------------------------------------------------------

message FileMetadata {
  string path                       = 1;
  bytes  content_hash               = 2;
  uint64 size                       = 3;
  int64  mtime_ns                   = 4;
  uint64 inode                      = 5;
  map<string, uint64> vector_clock  = 6;
  bool   deleted                    = 7;
  int64  deleted_at                 = 8;
  string node_id                    = 9;

  // Forward-compat (Phase 1 lock-in — see DISK-0002 STRIDE T1/T2)
  bytes  encryption_nonce           = 10;  // DISK-0015
  string tenant_id                  = 11;  // DISK-0017
  string vault_id                   = 12;  // DISK-0017 (multi-vault; "default" in v1.0)
  string user_id                    = 13;  // DISK-0017
  uint64 version_id                 = 14;  // DISK-0020
  uint64 parent_version_id          = 15;  // DISK-0020 (root version when 0)

  // Reserved for DISK-0022 sharing / DISK-0024 ACL.
  reserved 16, 17, 18, 19;
}

// -----------------------------------------------------------------------------
// Auth / node lifecycle
// -----------------------------------------------------------------------------

message NodeRegisterRequest {
  string node_id      = 1;
  string display_name = 2;
  string platform     = 3;

  // Forward-compat
  string user_id      = 4;
  string tenant_id    = 5;
}

message NodeRegisterResponse {
  string api_key      = 1;
  string assigned_id  = 2;
  int64  registered_at = 3;
}

// Phase 3: Authenticate with api_key → session_token (DISK-0004)
message NodeAuthRequest {
  string node_id  = 1;
  string api_key  = 2;
}

message NodeAuthResponse {
  string session_token = 1;
  int64  expires_at    = 2;
}

// -----------------------------------------------------------------------------
// Sync exchange
// -----------------------------------------------------------------------------

message SyncStateRequest {
  string node_id                    = 1;
  string session_token              = 2;
  repeated FileMetadata files       = 3;
  map<string, uint64> node_clock    = 4;

  // Forward-compat
  string tenant_id                  = 5;
  string vault_id                   = 6;
}

message SyncStateResponse {
  repeated FileMetadata to_upload   = 1;
  repeated FileMetadata to_download = 2;
  repeated FileMetadata to_delete   = 3;
  repeated ConflictReport conflicts = 4;
  map<string, uint64> server_clock  = 5;
}

// Phase 3: Acknowledgement with monotonic sequence_id for anti-replay (DISK-0004)
message SyncStateAck {
  string session_token = 1;
  uint64 sequence_id   = 2;  // monotonic per-stream — anti-replay anchor
}

// -----------------------------------------------------------------------------
// Delta transfer
// -----------------------------------------------------------------------------

message DeltaUploadRequest {
  string path           = 1;
  bytes  content_hash   = 2;
  repeated DeltaChunk chunks = 3;

  // Forward-compat
  string tenant_id      = 4;
  string vault_id       = 5;

  // DISK-0005 v1.1 — required when sender's enforced role = "publisher".
  // See PRD-DISK-0001 v1.1 §4.11 and creative-DISK-0005-data-model-publisher-signatures.md.
  PublisherSignatureProof publisher_proof = 6;
}

message DeltaChunk {
  uint64 offset         = 1;
  uint32 weak_checksum  = 2;  // Adler32
  bytes  strong_hash    = 3;  // blake3
  bytes  data           = 4;
}

message DeltaUploadResponse {
  bool   accepted       = 1;
  bytes  resulting_hash = 2;
}

// Phase 3: Server-streaming download (DISK-0004)
message DeltaDownloadRequest {
  string path          = 1;
  bytes  expected_hash = 2;
  string tenant_id     = 3;  // forward-compat
  string vault_id      = 4;  // forward-compat
}

// -----------------------------------------------------------------------------
// Conflicts
// -----------------------------------------------------------------------------

message ConflictReport {
  string path                       = 1;
  FileMetadata local                = 2;
  FileMetadata remote               = 3;
  string suggested_resolution       = 4;  // "fork-local" | "fork-remote" | "merge"
}

// -----------------------------------------------------------------------------
// Services
// -----------------------------------------------------------------------------

service AuthService {
  rpc RegisterNode (NodeRegisterRequest) returns (NodeRegisterResponse);
  // Phase 3: bearer token auth (DISK-0004)
  rpc Authenticate (NodeAuthRequest)     returns (NodeAuthResponse);
}

service SyncService {
  rpc ExchangeState  (SyncStateRequest)    returns (SyncStateResponse);
  rpc UploadDelta    (DeltaUploadRequest)  returns (DeltaUploadResponse);
  // Phase 3: bidi streaming and server-stream (DISK-0004)
  rpc SyncState      (stream SyncStateRequest)   returns (stream SyncStateAck);
  rpc DeltaUpload    (stream DeltaUploadRequest) returns (DeltaUploadResponse);
  rpc DeltaDownload  (DeltaDownloadRequest)      returns (stream DeltaChunk);
}

// -----------------------------------------------------------------------------
// DISK-0005 v1.1 — Enrollment + ACL + Publisher integrity gate
// See PRD-DISK-0001 v1.1 §4.11 / §4.12 and creative-DISK-0005-*.md.
// Timestamps use int64 unix milliseconds for symmetry with existing
// FileMetadata.mtime_ns / NodeRegisterResponse.registered_at conventions —
// avoids pulling google.protobuf.Timestamp into the wire format.
// -----------------------------------------------------------------------------

// Admin-bearer-protected RPC: server admin issues a pending-enrollment token.
message EnrollmentTokenRequest {
  string node_id_hint = 1;
  uint64 ttl_seconds  = 2;  // default 3600 (1h), max 86400 (24h)
  string tenant_id    = 3;  // DISK-0017 — SaaS tenant binding
}

message EnrollmentTokenResponse {
  bytes  opaque_token   = 1;  // 256-bit cryptographic random
  int64  expires_at_ms  = 2;  // unix ms
}

// Public RPC (TLS but not mTLS; bearer = opaque_token from EnrollmentTokenResponse).
message EnrollRequest {
  bytes  opaque_token  = 1;
  bytes  csr_pem       = 2;   // PEM-encoded CSR (Ed25519 keypair generated client-side)
  string node_id_hint  = 3;   // must match token's node_id_hint
}

message EnrollResponse {
  bytes client_cert_pem = 1;
  bytes ca_chain_pem    = 2;
  int64 expires_at_ms   = 3;  // cert TTL — 90 days default
}

// Admin-bearer-protected RPC: revoke an unconsumed pending token.
message RevokePendingRequest {
  bytes opaque_token = 1;
}

message RevokePendingResponse {
  bool revoked = 1;
}

// Structured tonic::Status detail returned with PermissionDenied when a node's
// declared direction (client metadata) disagrees with server-enforced ACL role.
// See creative-DISK-0005-architecture-acl-reload.md F1-F8.
message AclMismatchDetails {
  string claimed_role   = 1;  // from client metadata (informational only)
  string enforced_role  = 2;  // server-side authoritative
  string share          = 3;
  bytes  cert_fingerprint = 4;  // SHA-256 of DER-encoded client cert
  int64  ts_ms          = 5;
}

// Producer signature for publisher-role artefacts.
// See creative-DISK-0005-data-model-publisher-signatures.md.
// Signed payload (canonical byte order):
//   blake3(content) || share || path || signed_at_unix_ms || counter
// Verifier: ed25519_dalek::VerifyingKey::verify_strict against Vault-fetched pubkey.
message PublisherSignatureProof {
  bytes  ed25519_signature   = 1;  // 64 bytes
  string vault_key_ref       = 2;  // e.g. "transit/keys/disk-arcana-arcana-ai-publisher"
  int64  signed_at_unix_ms   = 3;
  uint64 counter             = 4;  // monotonic per (cert_fp, share); replay anchor
}

service EnrollmentService {
  // Admin-bearer scope; not invocable by regular nodes.
  rpc IssuePendingToken (EnrollmentTokenRequest) returns (EnrollmentTokenResponse);
  // Public scope (bearer = pending_token); pre-mTLS connection.
  rpc Enroll            (EnrollRequest)          returns (EnrollResponse);
  // Admin-bearer scope; revokes unconsumed token.
  rpc RevokePending     (RevokePendingRequest)   returns (RevokePendingResponse);
}
