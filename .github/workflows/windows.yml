name: Windows

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: windows-${{ matrix.target }}
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        target: [x86_64-pc-windows-msvc]
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          target: ${{ matrix.target }}
          components: rustfmt, clippy
      - name: Install protoc
        shell: pwsh
        run: |
          if (-not (Get-Command protoc -ErrorAction SilentlyContinue)) { choco install protoc -y --no-progress }
      - name: Format
        run: cargo fmt --all -- --check
      - name: Clippy
        run: cargo clippy --workspace --all-targets --all-features --target ${{ matrix.target }} -- -D warnings
      - name: Test
        run: cargo test --workspace --all-features --target ${{ matrix.target }}
      - name: Build
        run: cargo build --workspace --release --target ${{ matrix.target }}
