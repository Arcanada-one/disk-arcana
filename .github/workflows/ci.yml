name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  lint:
    name: Lint (fmt + clippy + audit + deny)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - name: cargo fmt
        run: cargo fmt --all -- --check
      - name: cargo clippy
        run: cargo clippy --all-targets --all-features -- -D warnings
      - name: cargo audit
        uses: rustsec/audit-check@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          # Rationale lives in .audit.toml at the repo root.
          ignore: RUSTSEC-2023-0071
      - name: Install cargo-deny
        uses: EmbarkStudios/cargo-deny-action@v1
        with:
          command: check licenses
      - name: ACL direction-spoofing lint (P4a Step 10)
        run: bash crates/disk-server/lints/no_branch_on_client_config.sh .
      - name: REST loopback-bind lint (R14)
        run: bash crates/disk-client/lints/check_loopback_bind.sh .
      - name: gitleaks
        # Run gitleaks directly via the upstream binary — gitleaks/gitleaks-action
        # requires a paid licence for organisation accounts.
        run: |
          GITLEAKS_VERSION=8.21.2
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar -xz -C /tmp gitleaks
          /tmp/gitleaks detect --source . --no-banner --redact --verbose

  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install protoc (linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - name: Install protoc (macos)
        if: runner.os == 'macOS'
        run: brew install protobuf
      # cargo audit lives in the Lint job (rustsec/audit-check@v1) which honours
      # .audit.toml ignore list. Duplicating it here via `cargo install cargo-audit`
      # bypasses that config and re-flags suppressed advisories (e.g. RUSTSEC-2023-0071
      # in unused sqlx-mysql). Single source of truth: Lint job.
      - name: Install cargo-llvm-cov (linux)
        if: runner.os == 'Linux'
        run: cargo install cargo-llvm-cov --locked --quiet
      - name: cargo test
        run: cargo test --workspace --all-features
      - name: Coverage gate (≥80 % lines, DISK-0032)
        if: runner.os == 'Linux'
        run: cargo llvm-cov --workspace --all-features --fail-under-lines 80

  build:
    name: Build (${{ matrix.target }})
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [lint, test]
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            use_cross: true
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            use_cross: true
          - target: x86_64-apple-darwin
            os: macos-latest
            use_cross: false
          - target: aarch64-apple-darwin
            os: macos-latest
            use_cross: false
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - name: Install protoc (linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - name: Install protoc (macos)
        if: runner.os == 'macOS'
        run: brew install protobuf
      - name: Install cross
        if: matrix.use_cross
        run: cargo install cross --locked
      - name: Build (cross)
        if: matrix.use_cross
        run: cross build --release --target ${{ matrix.target }} --workspace
      - name: Build (native)
        if: ${{ !matrix.use_cross }}
        run: cargo build --release --target ${{ matrix.target }} --workspace
