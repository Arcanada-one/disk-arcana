name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  lint:
    name: Lint (fmt + clippy + audit + deny)
    runs-on: [self-hosted, Linux, X64]
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Ensure protoc is available
        # Self-hosted runner pool is heterogeneous — some machines lack a
        # preinstalled protoc, so a bare `protoc --version` check fails with
        # exit 127 and the whole job dies before it can compile anything
        # (disk-proto build.rs invokes protoc). Fetch a pinned prebuilt protoc
        # without root — same pattern as the gitleaks step — when it is
        # missing; no-op when protoc is already present.
        run: |
          set -euo pipefail
          if command -v protoc >/dev/null 2>&1; then
            protoc --version
            exit 0
          fi
          PROTOC_VERSION=25.3
          PROTOC_DIR=$(mktemp -d "${RUNNER_TEMP:-/tmp}/protoc.XXXXXX")
          curl -sSL -o "$PROTOC_DIR/protoc.zip" \
            "https://github.com/protocolbuffers/protobuf/releases/download/v${PROTOC_VERSION}/protoc-${PROTOC_VERSION}-linux-x86_64.zip"
          python3 -c 'import sys, zipfile; zipfile.ZipFile(sys.argv[1]).extractall(sys.argv[2])' \
            "$PROTOC_DIR/protoc.zip" "$PROTOC_DIR"
          chmod +x "$PROTOC_DIR/bin/protoc"
          echo "$PROTOC_DIR/bin" >> "$GITHUB_PATH"
          "$PROTOC_DIR/bin/protoc" --version
      - name: cargo fmt
        run: cargo fmt --all -- --check
      - name: cargo clippy
        run: cargo clippy --all-targets --all-features -- -D warnings
      - name: Install cargo-audit + cargo-deny
        # Non-Docker install form. The previous EmbarkStudios/cargo-deny-action@v2
        # and rustsec/audit-check@v2 both ran (or the deny action built) inside a
        # Docker container; after infra-0308 rehomed CI to a non-root user the
        # self-hosted runner has no docker.sock access, so the Docker action
        # failed at "Build container for action" before any lint step ran. The
        # cargo-installed binaries run natively and honour deny.toml / the ignore
        # list below.
        run: |
          cargo install cargo-audit --locked
          cargo install cargo-deny --locked
      - name: cargo audit
        # Advisory suppressions (rationale for each also documented in .audit.toml):
        #   RUSTSEC-2023-0071  rsa Marvin — only via never-enabled sqlx-mysql.
        #   RUSTSEC-2026-0194  quick-xml quadratic dup-attr scan (DoS).
        #   RUSTSEC-2026-0195  quick-xml unbounded namespace-decl alloc (DoS).
        # quick-xml is a *build-time* dep of wayland-scanner (egui/eframe GUI
        # stack) that parses the trusted, fixed Wayland protocol XML shipped in
        # the crate — never runtime/user input — and cannot be bumped to >=0.41
        # without upgrading the whole egui 0.29 stack. crossbeam-epoch was bumped
        # to 0.9.20 in Cargo.lock (RUSTSEC-2026-0204, real fix, not suppressed).
        run: >
          cargo audit
          --ignore RUSTSEC-2023-0071
          --ignore RUSTSEC-2026-0194
          --ignore RUSTSEC-2026-0195
      - name: cargo deny check licenses
        run: cargo deny check licenses
      - name: ACL direction-spoofing lint (P4a Step 10)
        run: bash crates/disk-server/lints/no_branch_on_client_config.sh .
      - name: REST loopback-bind lint (R14)
        run: bash crates/disk-client/lints/check_loopback_bind.sh .
      - name: install.sh syntax (DISK-0010)
        run: sh -n scripts/install.sh
      - name: OWASP evidence paths (DISK-0012)
        run: bash scripts/validate-owasp-evidence.sh
      - name: load-test-harness.sh syntax (DISK-0012 G3)
        run: sh -n scripts/load-test-harness.sh
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: plugins/obsidian/package-lock.json
      - name: Obsidian plugin unit tests (DISK-0008)
        run: |
          set -euo pipefail
          cd plugins/obsidian
          npm ci
          npm run typecheck
          npm test
      - name: gitleaks
        # Run gitleaks directly via the upstream binary — gitleaks/gitleaks-action
        # requires a paid licence for organisation accounts.
        run: |
          set -euo pipefail
          GITLEAKS_VERSION=8.21.2
          GITLEAKS_BIN="${RUNNER_TEMP:-/tmp}/gitleaks-${GITLEAKS_VERSION}"
          if [ ! -x "$GITLEAKS_BIN" ]; then
            curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
              | tar -xz -C "${RUNNER_TEMP:-/tmp}" gitleaks
            mv "${RUNNER_TEMP:-/tmp}/gitleaks" "$GITLEAKS_BIN"
          fi
          "$GITLEAKS_BIN" detect --source . --no-banner --redact --verbose --config .gitleaks.toml

  test:
    name: Test (linux)
    runs-on: [self-hosted, Linux, X64]
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Ensure protoc is available
        # Self-hosted runner pool is heterogeneous — some machines lack a
        # preinstalled protoc, so a bare `protoc --version` check fails with
        # exit 127 and the whole job dies before it can compile anything
        # (disk-proto build.rs invokes protoc). Fetch a pinned prebuilt protoc
        # without root — same pattern as the gitleaks step — when it is
        # missing; no-op when protoc is already present.
        run: |
          set -euo pipefail
          if command -v protoc >/dev/null 2>&1; then
            protoc --version
            exit 0
          fi
          PROTOC_VERSION=25.3
          PROTOC_DIR=$(mktemp -d "${RUNNER_TEMP:-/tmp}/protoc.XXXXXX")
          curl -sSL -o "$PROTOC_DIR/protoc.zip" \
            "https://github.com/protocolbuffers/protobuf/releases/download/v${PROTOC_VERSION}/protoc-${PROTOC_VERSION}-linux-x86_64.zip"
          python3 -c 'import sys, zipfile; zipfile.ZipFile(sys.argv[1]).extractall(sys.argv[2])' \
            "$PROTOC_DIR/protoc.zip" "$PROTOC_DIR"
          chmod +x "$PROTOC_DIR/bin/protoc"
          echo "$PROTOC_DIR/bin" >> "$GITHUB_PATH"
          "$PROTOC_DIR/bin/protoc" --version
      - name: Install cargo-llvm-cov
        run: cargo install cargo-llvm-cov --locked --quiet
      - name: cargo test
        run: cargo test --workspace --all-features
      - name: Scanner load harness (1K + 10K, DISK-0012 G3)
        run: bash scripts/load-test-harness.sh all
      - name: Coverage gate (≥80 % lines, DISK-0032)
        run: cargo llvm-cov --workspace --all-features --fail-under-lines 80
      - name: Obsidian plugin integration (DISK-0008)
        run: bash scripts/test-obsidian-integration.sh

  fuzz-smoke:
    name: Fuzz smoke (DISK-0012, 80s)
    runs-on: [self-hosted, Linux, X64]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: fuzz
      - name: Ensure protoc is available
        # The self-hosted runner pool is heterogeneous: some machines have
        # protoc pre-installed (the lint/test jobs rely on that), others do not,
        # so this nightly fuzz job can land on a protoc-less runner and fail at
        # build time (disk-core -> disk-proto build.rs invokes protoc). Mirror
        # the gitleaks step below: fetch a pinned prebuilt protoc without root
        # and put it on PATH. No-op when protoc is already present.
        run: |
          set -euo pipefail
          if command -v protoc >/dev/null 2>&1; then
            protoc --version
            exit 0
          fi
          PROTOC_VERSION=25.3
          PROTOC_DIR=$(mktemp -d "${RUNNER_TEMP:-/tmp}/protoc.XXXXXX")
          curl -sSL -o "$PROTOC_DIR/protoc.zip" \
            "https://github.com/protocolbuffers/protobuf/releases/download/v${PROTOC_VERSION}/protoc-${PROTOC_VERSION}-linux-x86_64.zip"
          python3 -c 'import sys, zipfile; zipfile.ZipFile(sys.argv[1]).extractall(sys.argv[2])' \
            "$PROTOC_DIR/protoc.zip" "$PROTOC_DIR"
          chmod +x "$PROTOC_DIR/bin/protoc"
          echo "$PROTOC_DIR/bin" >> "$GITHUB_PATH"
          "$PROTOC_DIR/bin/protoc" --version
      - name: Install cargo-fuzz
        run: cargo +nightly install cargo-fuzz --locked --quiet
      - name: cargo fuzz smoke (all targets, DISK-0012)
        working-directory: fuzz
        run: |
          set -euo pipefail
          for target in apply_plan path_validate proto_decode reconcile; do
            echo "==> fuzz $target (20s)"
            cargo +nightly fuzz run "$target" -- -max_total_time=20
          done

  build:
    name: Build (${{ matrix.target }})
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [lint, test]
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            use_cross: true
          - target: aarch64-unknown-linux-gnu
            use_cross: true
    runs-on: [self-hosted, Linux, X64]
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - name: Ensure protoc is available
        # Self-hosted runner pool is heterogeneous — some machines lack a
        # preinstalled protoc, so a bare `protoc --version` check fails with
        # exit 127 and the whole job dies before it can compile anything
        # (disk-proto build.rs invokes protoc). Fetch a pinned prebuilt protoc
        # without root — same pattern as the gitleaks step — when it is
        # missing; no-op when protoc is already present.
        run: |
          set -euo pipefail
          if command -v protoc >/dev/null 2>&1; then
            protoc --version
            exit 0
          fi
          PROTOC_VERSION=25.3
          PROTOC_DIR=$(mktemp -d "${RUNNER_TEMP:-/tmp}/protoc.XXXXXX")
          curl -sSL -o "$PROTOC_DIR/protoc.zip" \
            "https://github.com/protocolbuffers/protobuf/releases/download/v${PROTOC_VERSION}/protoc-${PROTOC_VERSION}-linux-x86_64.zip"
          python3 -c 'import sys, zipfile; zipfile.ZipFile(sys.argv[1]).extractall(sys.argv[2])' \
            "$PROTOC_DIR/protoc.zip" "$PROTOC_DIR"
          chmod +x "$PROTOC_DIR/bin/protoc"
          echo "$PROTOC_DIR/bin" >> "$GITHUB_PATH"
          "$PROTOC_DIR/bin/protoc" --version
      - name: Install cross
        if: matrix.use_cross
        run: cargo install cross --locked
      - name: Build (cross)
        if: matrix.use_cross
        run: cross build --release --target ${{ matrix.target }} --workspace
      - name: Build (native)
        if: ${{ !matrix.use_cross }}
        run: cargo build --release --target ${{ matrix.target }} --workspace
