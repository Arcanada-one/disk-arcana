name: Fuzz deep (scheduled)

on:
  schedule:
    # Weekly Sunday 03:00 UTC — long fuzz runs (DISK-0012 tail).
    - cron: "0 3 * * 0"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  fuzz-deep:
    name: Deep fuzz (${{ matrix.target }}, 10m)
    runs-on: [self-hosted, Linux, X64]
    strategy:
      fail-fast: false
      matrix:
        target:
          - apply_plan
          - path_validate
          - proto_decode
          - reconcile
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: fuzz
      - name: Ensure protoc is available
        run: |
          set -euo pipefail
          if command -v protoc >/dev/null 2>&1; then
            protoc --version
            exit 0
          fi
          PROTOC_VERSION=25.3
          PROTOC_DIR=$(mktemp -d "${RUNNER_TEMP:-/tmp}/protoc.XXXXXX")
          curl -sSL -o "$PROTOC_DIR/protoc.zip" \
            "https://github.com/protocolbuffers/protobuf/releases/download/v${PROTOC_VERSION}/protoc-${PROTOC_VERSION}-linux-x86_64.zip"
          python3 -c 'import sys, zipfile; zipfile.ZipFile(sys.argv[1]).extractall(sys.argv[2])' \
            "$PROTOC_DIR/protoc.zip" "$PROTOC_DIR"
          chmod +x "$PROTOC_DIR/bin/protoc"
          echo "$PROTOC_DIR/bin" >> "$GITHUB_PATH"
          "$PROTOC_DIR/bin/protoc" --version
      - name: Install cargo-fuzz
        run: cargo +nightly install cargo-fuzz --locked --quiet
      - name: cargo fuzz run ${{ matrix.target }}
        working-directory: fuzz
        run: cargo +nightly fuzz run ${{ matrix.target }} -- -max_total_time=600
