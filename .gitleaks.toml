# gitleaks configuration — false-positive allowlist for test fixtures.
#
# Background: gitleaks scans every file for high-entropy strings that *look*
# like secrets. Inside test modules we intentionally use deterministic
# placeholders so behaviour is reproducible — those are not real secrets but
# they trip the default rule set.
#
# The allowlist below extends the default `gitleaks` rules (no rules
# disabled). Each path/regex pair is tied to a specific test fixture; the
# rationale is documented in the commit that introduced the entry.
#
# Compatibility note: gitleaks v8.18+ supports `[[allowlists]]` (array of
# tables); older v8.x only supports singular `[allowlist]`. This file uses
# singular form so it works with both CI (v8.21.2) and local (v8.30.1)
# scanners.

[extend]
useDefault = true

[allowlist]
description = "Test fixtures: deterministic placeholder tokens, dummy PEM bodies, Vault Transit paths. All entries live inside `#[cfg(test)]` modules or under `tests/` and never compile into the production binary."
paths = [
    # bootstrap-file parser unit test — `token = "0123456789abcdef"` hex
    # placeholder + `ca_cert_pem = "-----BEGIN CERTIFICATE-----\\nMIIB...\\n..."`
    # dummy body.
    '''crates/disk-client/src/enrollment\.rs''',
    # keystore round-trip unit test — literal `"fake"` body inside PEM markers.
    '''crates/disk-client/src/keychain\.rs''',
    # publisher signature integration tests — `vault_key_ref` is a Vault Transit
    # *path* (`transit/keys/publisher`), not a secret; Vault enforces ACL on
    # the path itself.
    '''crates/disk-server/tests/publisher_signature_success\.rs''',
]
