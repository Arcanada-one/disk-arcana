# cargo-deny configuration — license allowlist, advisory & ban rules.
# Source: https://embarkstudios.github.io/cargo-deny/

[graph]
all-features = true

[licenses]
# Permissive + weak-copyleft licenses we accept.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "MPL-2.0",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "Zlib",
    "CC0-1.0",
    "OpenSSL",
    # webpki-roots@1.0.7+ ships the Mozilla CA bundle under CDLA-Permissive-2.0
    # (the Linux Foundation's Community Data License Agreement). It allows
    # unrestricted use, modification, and distribution of the data, so it sits
    # comfortably with the rest of the permissive allowlist. Pulled in via
    # reqwest → hyper-rustls.
    "CDLA-Permissive-2.0",
    # BSL-1.0 (Boost Software License 1.0) — OSI- and FSF-approved, fully
    # permissive (no attribution required for binaries). Pulled in transitively
    # by the macOS GUI stack only: error-code → clipboard-win → arboard →
    # egui-winit → eframe. Unavoidable if we use eframe on macOS.
    "BSL-1.0",
    # OFL-1.1 (SIL Open Font License 1.1) — covers the default UI fonts bundled
    # by epaint_default_fonts → epaint → egui → eframe. A standard, permissive
    # font license; the fonts are embedded data, not linked code.
    "OFL-1.1",
]
confidence-threshold = 0.8

# epaint_default_fonts declares `(MIT OR Apache-2.0) AND OFL-1.1 AND
# LicenseRef-UFL-1.0`. UFL-1.0 (Ubuntu Font Licence) is a permissive font
# license but is not an SPDX identifier, so it cannot go in `allow`; grant it
# as a crate-scoped exception. Source: eframe's default font set.
exceptions = [
    { allow = ["LicenseRef-UFL-1.0"], crate = "epaint_default_fonts" },
]

[bans]
multiple-versions = "warn"
wildcards = "warn"

[advisories]
yanked = "warn"
# See `.audit.toml` for full rationale.
ignore = [
    "RUSTSEC-2023-0071",  # rsa Marvin — only via sqlx-mysql, never enabled.
    # RUSTSEC-2025-0134 (rustls-pemfile unmaintained) dropped: the tonic 0.13
    # upgrade removed rustls-pemfile from the dependency tree entirely, so the
    # advisory no longer matches any crate. Keeping the suppression made
    # cargo-deny emit `advisory-not-detected` and would silently mask the
    # advisory if it ever resurfaced transitively. Re-add only if it returns.
]

[sources]
unknown-registry = "warn"
unknown-git      = "warn"
